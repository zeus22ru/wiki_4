# Векторное хранилище приложения — ChromaDB (локальный каталог CHROMA_PERSIST_DIR), не Qdrant.
# Поднимается только Ollama для эмбеддингов и чата. При необходимости Qdrant можно добавить отдельно.
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_storage:
    driver: local
